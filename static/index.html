<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashcam Cut-In Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      color: #e0e0e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #a78bfa;
      margin-bottom: 32px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 12px;
      padding: 28px 32px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }
    /* Upload form */
    .upload-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #252535;
      border: 1px solid #3b3b55;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      flex: 1;
      min-width: 200px;
    }
    .file-label:hover { border-color: #7c3aed; }
    .file-label span { color: #9ca3af; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #fileInput { display: none; }
    .btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #6d28d9; }
    .btn:disabled { background: #4b5563; cursor: not-allowed; }
    /* Progress */
    #progressSection { display: none; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      background: #252535;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .status-msg { font-size: 0.88rem; color: #d1d5db; }
    /* Error */
    #errorBox {
      display: none;
      background: #2d1515;
      border: 1px solid #b91c1c;
      border-radius: 8px;
      color: #fca5a5;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-top: 12px;
    }
    /* Results */
    #resultsSection { display: none; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead tr {
      background: #252535;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.75rem;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #2e2e42;
      white-space: nowrap;
    }
    tbody tr:hover { background: #1e1e2e; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-left  { background: #1e3a5f; color: #60a5fa; }
    .badge-right { background: #3b1f5e; color: #c084fc; }
    .badge-on    { background: #1a3a1a; color: #4ade80; }
    .badge-off   { background: #1e2a1e; color: #6b7280; }
    .badge-none  { background: #1e2a1e; color: #6b7280; }
    .play-btn {
      background: #1e2e1e;
      border: 1px solid #4b5563;
      color: #a3e635;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .play-btn:hover { background: #2a3f2a; }
    .inline-video {
      display: block;
      margin-top: 8px;
      max-width: 320px;
      border-radius: 6px;
      background: #000;
    }
    .no-clip { color: #4b5563; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Dashcam Cut-In Analyzer</h1>

  <!-- Upload Card -->
  <div class="card">
    <h2>영상 업로드</h2>
    <div class="upload-row">
      <label class="file-label" for="fileInput">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 8l4-4 4 4"/></svg>
        <span id="fileNameDisplay">파일을 선택하세요…</span>
      </label>
      <input type="file" id="fileInput" accept="video/*" />
      <button class="btn" id="uploadBtn" onclick="startUpload()" disabled>분석 시작</button>
    </div>

    <!-- Progress -->
    <div id="progressSection" style="margin-top:20px;">
      <div class="progress-label">
        <span id="progressMsg">처리 중…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- Error -->
    <div id="errorBox"></div>
  </div>

  <!-- Results Card -->
  <div class="card" id="resultsSection">
    <h2>분석 결과</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>이벤트 ID</th>
            <th>시작 프레임</th>
            <th>종료 프레임</th>
            <th>트랙 ID</th>
            <th>번호판</th>
            <th>방향지시등</th>
            <th>클립</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressSection = document.getElementById('progressSection');
    const progressMsg = document.getElementById('progressMsg');
    const progressPct = document.getElementById('progressPct');
    const progressFill = document.getElementById('progressFill');
    const statusMsg = document.getElementById('statusMsg');
    const errorBox = document.getElementById('errorBox');
    const resultsSection = document.getElementById('resultsSection');
    const resultsBody = document.getElementById('resultsBody');

    let pollTimer = null;
    let currentJobId = null;

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        fileNameDisplay.textContent = file.name;
        uploadBtn.disabled = false;
      } else {
        fileNameDisplay.textContent = '파일을 선택하세요…';
        uploadBtn.disabled = true;
      }
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    function setProgress(pct, msg, detail) {
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
      progressMsg.textContent = msg || '처리 중…';
      statusMsg.textContent = detail || '';
    }

    async function startUpload() {
      const file = fileInput.files[0];
      if (!file) return;

      hideError();
      resultsSection.style.display = 'none';
      resultsBody.innerHTML = '';
      uploadBtn.disabled = true;

      const formData = new FormData();
      formData.append('file', file);

      progressSection.style.display = 'block';
      setProgress(0, '업로드 중…', '서버에 파일을 전송하고 있습니다.');

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `업로드 실패 (${res.status})`);
        }
        const data = await res.json();
        currentJobId = data.job_id;
        setProgress(5, '분석 시작됨', `Job ID: ${currentJobId}`);
        startPolling(currentJobId);
      } catch (e) {
        showError('업로드 오류: ' + e.message);
        uploadBtn.disabled = false;
      }
    }

    function startPolling(jobId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => pollJob(jobId), 2000);
    }

    async function pollJob(jobId) {
      try {
        const res = await fetch(`/jobs/${jobId}`);
        if (!res.ok) throw new Error(`상태 조회 실패 (${res.status})`);
        const data = await res.json();

        const pct = typeof data.progress === 'number' ? Math.round(data.progress * 100) : 0;
        setProgress(pct, statusLabel(data.status), data.message || '');

        if (data.status === 'done' || data.status === 'completed') {
          clearInterval(pollTimer);
          setProgress(100, '분석 완료', data.message || '결과를 불러오는 중…');
          await loadResults(jobId);
          uploadBtn.disabled = false;
        } else if (data.status === 'failed') {
          clearInterval(pollTimer);
          showError('분석 실패: ' + (data.message || '알 수 없는 오류'));
          uploadBtn.disabled = false;
        }
      } catch (e) {
        // transient error — keep polling
        console.warn('Poll error:', e);
      }
    }

    function statusLabel(s) {
      const map = { queued: '대기 중', pending: '대기 중', processing: '분석 중', done: '완료', completed: '완료', failed: '실패' };
      return map[s] || s;
    }

    async function loadResults(jobId) {
      try {
        const res = await fetch(`/jobs/${jobId}/result`);
        if (!res.ok) throw new Error(`결과 조회 실패 (${res.status})`);
        const data = await res.json();
        renderResults(jobId, data.events || []);
      } catch (e) {
        showError('결과 로드 오류: ' + e.message);
      }
    }

    function renderResults(jobId, events) {
      resultsBody.innerHTML = '';
      if (events.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" style="color:#6b7280;text-align:center;padding:20px;">감지된 이벤트가 없습니다.</td>';
        resultsBody.appendChild(tr);
      } else {
        events.forEach(ev => {
          const tr = document.createElement('tr');
          tr.appendChild(td(ev.event_id ?? '—'));
          tr.appendChild(td(ev.frame_start ?? '—'));
          tr.appendChild(td(ev.frame_end ?? '—'));
          tr.appendChild(td(ev.track_id ?? '—'));
          tr.appendChild(td(ev.plate_text || '—'));
          tr.appendChild(tdSignal(ev.turn_signal));
          tr.appendChild(tdClip(jobId, ev));
          resultsBody.appendChild(tr);
        });
      }
      resultsSection.style.display = 'block';
    }

    function td(text) {
      const el = document.createElement('td');
      el.textContent = text;
      return el;
    }

    function tdSignal(signal) {
      const el = document.createElement('td');
      const s = (signal || '').toLowerCase();
      let cls = 'badge-none', label = signal || '없음';
      if (s === 'on')  { cls = 'badge-on';  label = '켜짐'; }
      else if (s === 'off') { cls = 'badge-off'; label = '꺼짐'; }
      else if (s === 'unknown') { cls = 'badge-none'; label = '미확인'; }
      else if (s === 'left') { cls = 'badge-left'; label = '좌회전'; }
      else if (s === 'right') { cls = 'badge-right'; label = '우회전'; }
      el.innerHTML = `<span class="badge ${cls}">${label}</span>`;
      return el;
    }

    function tdClip(jobId, ev) {
      const el = document.createElement('td');
      if (!ev.clip_filename) {
        el.innerHTML = '<span class="no-clip">—</span>';
        return el;
      }
      const clipUrl = `/jobs/${jobId}/clips/${encodeURIComponent(ev.clip_filename)}`;
      const btn = document.createElement('button');
      btn.className = 'play-btn';
      btn.textContent = '▶ 재생';
      let video = null;
      btn.addEventListener('click', () => {
        if (video) {
          video.remove();
          video = null;
          btn.textContent = '▶ 재생';
          return;
        }
        video = document.createElement('video');
        video.src = clipUrl;
        video.controls = true;
        video.autoplay = true;
        video.className = 'inline-video';
        el.appendChild(video);
        btn.textContent = '■ 닫기';
      });
      el.appendChild(btn);
      return el;
    }
  </script>
</body>
</html>
